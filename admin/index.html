<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель управления — Mihey Sound</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --black: #0a0a0a; --white: #fff; --gray: #f5f5f5; --border: #e0e0e0; --red: #e53e3e; --font: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
body { font-family: var(--font); background: var(--gray); color: var(--black); min-height: 100vh; }
#login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 48px; width: 360px; text-align: center; }
.login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.login-box p { font-size: 13px; color: #888; margin-bottom: 32px; }
.login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; font-family: var(--font); }
.login-box button { width: 100%; padding: 10px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: var(--font); }
#app { display: none; max-width: 900px; margin: 0 auto; padding: 32px 16px; }
.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.app-header h1 { font-size: 18px; font-weight: 600; }
.app-header button { padding: 8px 20px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--font); }
.project-item { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
.project-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
.project-info { flex: 1; }
.project-title { font-size: 14px; font-weight: 500; }
.project-sub { font-size: 12px; color: #888; margin-top: 2px; }
.project-actions { display: flex; gap: 8px; }
.btn-edit { padding: 6px 14px; background: none; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--font); }
.btn-edit:hover { background: var(--gray); }
.btn-del { padding: 6px 14px; background: none; border: 1px solid #fca5a5; color: var(--red); border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--font); }
#form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; overflow-y: auto; padding: 32px 16px; }
.form-box { background: var(--white); border-radius: 12px; max-width: 640px; margin: 0 auto; padding: 32px; }
.form-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; font-weight: 500; color: #555; margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
.form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font); }
.form-group textarea { height: 100px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.tags-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-cb { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border); border-radius: 100px; }
.tag-cb input { display: none; }
.tag-cb.checked { background: var(--black); color: var(--white); border-color: var(--black); }
.img-upload { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; }
.img-upload:hover { border-color: var(--black); }
.img-upload input { display: none; }
.img-preview { max-height: 120px; border-radius: 6px; margin-top: 12px; }
.form-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-save { flex: 1; padding: 12px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: var(--font); }
.btn-cancel { padding: 12px 24px; background: none; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; font-family: var(--font); }
#status { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--black); color: var(--white); border-radius: 8px; font-size: 13px; display: none; z-index: 200; }
.empty { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
.credit-row { display: flex; gap: 8px; margin-bottom: 8px; }
.credit-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: var(--font); }
.credit-row button { padding: 6px 10px; background: none; border: 1px solid #fca5a5; color: var(--red); border-radius: 6px; cursor: pointer; font-size: 12px; }
.tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; flex-wrap: wrap; }
.tab { padding: 8px 16px; background: none; border: none; font-size: 14px; cursor: pointer; color: #888; font-family: var(--font); border-radius: 6px; }
.tab.active { background: var(--black); color: var(--white); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.section-header h2 { font-size: 18px; font-weight: 600; }
.btn-add { padding: 8px 20px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--font); }
#tag-form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; overflow-y: auto; padding: 32px 16px; }
.media-item { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: default; }
.media-item.drag-over { border-color: var(--black); background: #f9f9f9; }
.media-item.dragging { opacity: .4; }
.media-item-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.drag-handle { font-size: 18px; color: #ccc; cursor: grab; flex-shrink: 0; user-select: none; padding: 0 4px; line-height: 1; }
.drag-handle:active { cursor: grabbing; }
.media-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.media-icon { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--gray); border-radius: 6px; flex-shrink: 0; }
.media-item-info { flex: 1; min-width: 0; }
.media-item-url { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-item-type { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #bbb; margin-top: 2px; }
.media-caption { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: var(--font); resize: vertical; }
.media-del { padding: 4px 8px; background: none; border: 1px solid #fca5a5; color: var(--red); border-radius: 6px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
</style>
<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h1>Mihey Sound</h1>
    <p>Панель управления сайтом</p>
    <input type="password" id="pwd-input" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Войти</button>
  </div>
</div>

<div id="app">
  <div class="tabs">
    <button type="button" class="tab active" onclick="switchTab('projects',this)">Проекты</button>
    <button type="button" class="tab" onclick="switchTab('tags',this)">Теги</button>
    <button type="button" class="tab" onclick="switchTab('settings',this)">Настройки</button>
  </div>

  <div id="tab-projects" style="display:block">
    <div class="section-header">
      <h2>Проекты</h2>
      <button type="button" class="btn-add" onclick="openForm(-1)">+ Добавить проект</button>
    </div>
    <div id="projects-list"></div>
  </div>

  <div id="tab-tags" style="display:none">
    <div class="section-header">
      <h2>Теги</h2>
      <button type="button" class="btn-add" onclick="openTagForm(-1)">+ Добавить тег</button>
    </div>
    <div id="tags-list"></div>
  </div>

  <div id="tab-settings" style="display:none">
    <div class="section-header"><h2>Настройки сайта</h2></div>
    <div class="settings-card" style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:24px;margin-bottom:16px">
      <p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px">Навигация</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Текст кнопки Связаться</label><input id="s-contact-label" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Ссылка кнопки Связаться</label><input id="s-contact-url" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
      </div>
    </div>
    <div class="settings-card" style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:24px;margin-bottom:16px">
      <p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px">Футер — Follow</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Название ссылки 1</label><input id="s-social1-label" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Ссылка 1</label><input id="s-social1-url" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Название ссылки 2</label><input id="s-social2-label" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Ссылка 2</label><input id="s-social2-url" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
      </div>
    </div>
    <div class="settings-card" style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:24px;margin-bottom:16px">
      <p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px">Футер — Contact</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Текст контакта</label><input id="s-email" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
        <div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">Ссылка (mailto: или URL)</label><input id="s-email-url" style="width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit"></div>
      </div>
    </div>
    <button type="button" onclick="saveSettings()" style="padding:10px 24px;background:#0a0a0a;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px">Сохранить настройки</button>
  </div>
</div>

<div id="form-overlay">
  <div class="form-box">
    <h2 id="form-title">Новый проект</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Название</label>
        <input id="f-title" placeholder="">
      </div>
      <div class="form-group">
        <label>Подзаголовок</label>
        <input id="f-subtitle" placeholder="">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Год</label>
        <input id="f-year" placeholder="">
      </div>
      <div class="form-group">
        <label>Услуги (через запятую)</label>
        <input id="f-services" placeholder="">
      </div>
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea id="f-details" placeholder="Описание проекта..."></textarea>
    </div>
    <div class="form-group">
      <label>Теги</label>
      <div class="tags-grid" id="tags-grid"></div>
    </div>
    <div class="form-group">
      <label>Обложка проекта</label>
      <div class="img-upload" onclick="document.getElementById('cover-input').click()">
        <input type="file" id="cover-input" accept="image/*" onchange="previewCover(this)">
        <div id="cover-preview-wrap">
          <div style="font-size:13px;color:#aaa">Нажмите чтобы загрузить фото</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Медиафайлы</label>
      <div id="media-list"></div>
      <button type="button" onclick="openUploadWidget()" style="margin-top:8px;padding:6px 14px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font)">+ Загрузить фото / видео / аудио</button>
    </div>
    <div class="form-group">
      <label>Кредиты</label>
      <div id="credits-list"></div>
      <button onclick="addCredit('','')" style="margin-top:8px;padding:6px 14px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font)">+ Добавить участника</button>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">Отмена</button>
      <button class="btn-save" onclick="saveProject()">Сохранить</button>
    </div>
  </div>
</div>

<div id="tag-form-overlay">
  <div class="form-box">
    <h2 id="tag-form-title">Новый тег</h2>
    <div class="form-group">
      <label>Название</label>
      <input id="tag-label" placeholder="Отображаемое имя">
    </div>
    <div class="form-group">
      <label>Значение (латиницей)</label>
      <input id="tag-value" placeholder="slug">
    </div>
    <div class="form-actions">
      <button type="button" class="btn-cancel" onclick="closeTagForm()">Отмена</button>
      <button type="button" class="btn-save" onclick="saveTag()">Сохранить</button>
    </div>
  </div>
</div>

<div id="status"></div>

<script>
const REPO = 'egorasus/mihey-portfolio';
const BRANCH = 'main';

const PASSWORD = 'passwordmihey';

let projects = [];
let editIdx = -1;
let coverBase64 = '';
let coverPath = '';
let existingCover = '';
let projectsSha = '';
let tags = [];
let tagsSha = '';
let tagEditIdx = -1;
let settingsSha = '';

function doLogin() {
  if (document.getElementById('pwd-input').value === PASSWORD) {
    localStorage.setItem('admin_auth', 'true');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showStatus('Загружаем...');
    Promise.all([loadProjects(), loadTags(), loadSettings()]).finally(() => hideStatus());
  } else {
    alert('Неверный пароль');
  }
}

if (localStorage.getItem('admin_auth') === 'true') {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  Promise.all([loadProjects(), loadTags(), loadSettings()]).finally(() => hideStatus());
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['projects', 'tags', 'settings'].forEach(n => {
    const pane = document.getElementById('tab-' + n);
    if (pane) pane.style.display = n === name ? 'block' : 'none';
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderProjectTagGrid() {
  const grid = document.getElementById('tags-grid');
  if (!grid) return;
  if (!tags.length) {
    grid.innerHTML = '<span style="font-size:13px;color:#888">Сначала добавьте теги во вкладке «Теги»</span>';
    return;
  }
  grid.innerHTML = tags.map(t =>
    `<label class="tag-cb" onclick="toggleTag(this)"><input type="checkbox" value="${escapeHtml(t.value)}">${escapeHtml(t.label)}</label>`
  ).join('');
}

function toggleTag(label) {
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

async function apiGet(path) {
  const r = await fetch(`https://miheysound-oauth.egorkurakinwork.workers.dev/api/github?path=${encodeURIComponent(path)}&ref=${BRANCH}`, {
    headers: { 'X-Password': PASSWORD }
  });
  return r.json();
}

async function apiPut(path, content, sha) {
  const body = { path, content: btoa(unescape(encodeURIComponent(content))), sha, branch: BRANCH, message: `Update ${path}` };
  const r = await fetch(`https://miheysound-oauth.egorkurakinwork.workers.dev/api/github`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Password': PASSWORD },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function apiPutBinary(path, b64) {
  const body = { path, content: b64, branch: BRANCH, message: `Upload ${path}`, binary: true };
  const r = await fetch(`https://miheysound-oauth.egorkurakinwork.workers.dev/api/github`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Password': PASSWORD },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function loadProjects() {
  try {
    const data = await apiGet('data/projects.json');
    projectsSha = data.sha;
    const json = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    projects = json.projects || [];
    renderList();
  } catch(e) { projects = []; renderList(); }
}

async function loadTags() {
  try {
    const data = await apiGet('data/tags.json');
    tagsSha = data.sha;
    const json = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    tags = json.tags || [];
    renderTags();
    renderProjectTagGrid();
  } catch(e) {
    tags = [];
    tagsSha = '';
    renderTags();
    renderProjectTagGrid();
  }
}

function renderTags() {
  const el = document.getElementById('tags-list');
  if (!el) return;
  if (!tags.length) {
    el.innerHTML = '<div class="empty">Нет тегов. Добавьте первый!</div>';
    return;
  }
  el.innerHTML = tags.map((t, i) => `
    <div class="project-item">
      <div class="project-info">
        <div class="project-title">${escapeHtml(t.label || '—')}</div>
        <div class="project-sub">${escapeHtml(t.value || '')}</div>
      </div>
      <div class="project-actions">
        <button type="button" class="btn-edit" onclick="openTagForm(${i})">Изменить</button>
        <button type="button" class="btn-del" onclick="deleteTag(${i})">Удалить</button>
      </div>
    </div>
  `).join('');
}

function openTagForm(idx) {
  tagEditIdx = idx;
  document.getElementById('tag-form-title').textContent = idx === -1 ? 'Новый тег' : 'Редактировать тег';
  document.getElementById('tag-label').value = '';
  document.getElementById('tag-value').value = '';
  if (idx !== -1 && tags[idx]) {
    document.getElementById('tag-label').value = tags[idx].label || '';
    document.getElementById('tag-value').value = tags[idx].value || '';
  }
  document.getElementById('tag-form-overlay').style.display = 'block';
}

function closeTagForm() {
  document.getElementById('tag-form-overlay').style.display = 'none';
}

async function saveTag() {
  const label = document.getElementById('tag-label').value.trim();
  let value = document.getElementById('tag-value').value.trim().replace(/\s+/g, '-').toLowerCase();
  if (!label || !value) {
    alert('Заполните название и значение');
    return;
  }
  showStatus('Сохраняем...');
  const item = { label, value };
  if (tagEditIdx === -1) tags.push(item);
  else tags[tagEditIdx] = item;
  const json = JSON.stringify({ tags }, null, 2);
  try {
    const result = await apiPut('data/tags.json', json, tagsSha || undefined);
    tagsSha = result.content?.sha || tagsSha;
    closeTagForm();
    renderTags();
    renderProjectTagGrid();
    showStatus('✓ Теги сохранены');
    setTimeout(hideStatus, 3000);
  } catch(e) {
    alert('Ошибка сохранения тегов');
    hideStatus();
  }
}

async function deleteTag(i) {
  if (!confirm(`Удалить тег "${tags[i].label}"?`)) return;
  showStatus('Удаляем...');
  tags.splice(i, 1);
  const json = JSON.stringify({ tags }, null, 2);
  try {
    const result = await apiPut('data/tags.json', json, tagsSha);
    tagsSha = result.content?.sha || tagsSha;
    renderTags();
    renderProjectTagGrid();
    showStatus('✓ Удалено');
    setTimeout(hideStatus, 2000);
  } catch(e) {
    hideStatus();
    alert('Ошибка удаления');
  }
}

async function loadSettings() {
  try {
    const data = await apiGet('data/settings.json');
    settingsSha = data.sha;
    const s = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    document.getElementById('s-contact-label').value = s.contact_label || '';
    document.getElementById('s-contact-url').value = s.contact_url || '';
    document.getElementById('s-social1-label').value = s.social1_label || '';
    document.getElementById('s-social1-url').value = s.social1_url || '';
    document.getElementById('s-social2-label').value = s.social2_label || '';
    document.getElementById('s-social2-url').value = s.social2_url || '';
    document.getElementById('s-email').value = s.email || '';
    document.getElementById('s-email-url').value = s.email_url || '';
  } catch(e) {
    settingsSha = '';
  }
}

async function saveSettings() {
  showStatus('Сохраняем настройки...');
  const obj = {
    contact_label: document.getElementById('s-contact-label').value.trim(),
    contact_url: document.getElementById('s-contact-url').value.trim() || '#',
    social1_label: document.getElementById('s-social1-label').value.trim(),
    social1_url: document.getElementById('s-social1-url').value.trim() || '#',
    social2_label: document.getElementById('s-social2-label').value.trim(),
    social2_url: document.getElementById('s-social2-url').value.trim() || '#',
    email: document.getElementById('s-email').value.trim(),
    email_url: document.getElementById('s-email-url').value.trim() || '#'
  };
  const json = JSON.stringify(obj, null, 2);
  try {
    const result = await apiPut('data/settings.json', json, settingsSha || undefined);
    settingsSha = result.content?.sha || settingsSha;
    showStatus('✓ Настройки сохранены');
    setTimeout(hideStatus, 3000);
  } catch(e) {
    alert('Ошибка сохранения настроек');
    hideStatus();
  }
}

function renderList() {
  const el = document.getElementById('projects-list');
  if (!projects.length) { el.innerHTML = '<div class="empty">Нет проектов. Добавьте первый!</div>'; return; }
  el.innerHTML = projects.map((p, i) => `
    <div class="project-item">
      ${p.cover ? `<img class="project-thumb" src="${p.cover}" onerror="this.style.background='#eee';this.style.display='block'">` : '<div class="project-thumb"></div>'}
      <div class="project-info">
        <div class="project-title">${p.title || '—'}</div>
        <div class="project-sub">${p.subtitle || ''} · ${p.year || ''}</div>
      </div>
      <div class="project-actions">
        <button class="btn-edit" onclick="openForm(${i})">Изменить</button>
        <button class="btn-del" onclick="deleteProject(${i})">Удалить</button>
      </div>
    </div>
  `).join('');
}

function openForm(idx) {
  editIdx = idx;
  coverBase64 = ''; coverPath = ''; existingCover = '';
  document.getElementById('form-title').textContent = idx === -1 ? 'Новый проект' : 'Редактировать проект';
  document.getElementById('f-title').value = '';
  document.getElementById('f-subtitle').value = '';
  document.getElementById('f-year').value = '';
  document.getElementById('f-details').value = '';
  document.getElementById('f-services').value = '';
  document.getElementById('cover-preview-wrap').innerHTML = '<div style="font-size:13px;color:#aaa">Нажмите чтобы загрузить фото</div>';
  document.getElementById('cover-input').value = '';
  document.querySelectorAll('.tag-cb').forEach(l => { l.querySelector('input').checked = false; l.classList.remove('checked'); });
  document.getElementById('credits-list').innerHTML = '';
  document.getElementById('media-list').innerHTML = '';

  if (idx !== -1) {
    const p = projects[idx];
    document.getElementById('f-title').value = p.title || '';
    document.getElementById('f-subtitle').value = p.subtitle || '';
    document.getElementById('f-year').value = p.year || '';
    document.getElementById('f-details').value = p.details || '';
    document.getElementById('f-services').value = (p.services || []).join(', ');
    existingCover = p.cover || '';
    if (p.cover) document.getElementById('cover-preview-wrap').innerHTML = `<img class="img-preview" src="${p.cover}">`;
    (p.tags || []).forEach(t => {
      const l = document.querySelector(`.tag-cb input[value="${t}"]`)?.parentElement;
      if (l) { l.querySelector('input').checked = true; l.classList.add('checked'); }
    });
    (p.credits || []).forEach(c => addCredit(c.role, c.name));
    (p.images || []).forEach(img => {
      const item = typeof img === 'string' ? { type: 'image', url: img, caption: '' } : img;
      addMediaItem(item);
    });
  } else {
    addCredit('', '');
  }
  document.getElementById('form-overlay').style.display = 'block';
}

function closeForm() { document.getElementById('form-overlay').style.display = 'none'; }

function addCredit(role, name) {
  const div = document.createElement('div');
  div.className = 'credit-row';
  div.innerHTML = `
    <input placeholder="" value="${role}">
    <input placeholder="" value="${name}">
    <button onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('credits-list').appendChild(div);
}

const AUDIO_FORMATS = new Set(['mp3','wav','aac','ogg','flac','m4a','opus','wma']);
let _uploadWidget = null;

function openUploadWidget() {
  if (!_uploadWidget) {
    _uploadWidget = cloudinary.createUploadWidget({
      cloudName: 'dckjt7i6f',
      uploadPreset: 'mihey_upload',
      sources: ['local'],
      resourceType: 'auto',
      multiple: true
    }, (error, result) => {
      if (error) { console.error(error); return; }
      if (result && result.event === 'success') {
        const info = result.info;
        const fmt = (info.format || '').toLowerCase();
        const type = info.resource_type === 'image' ? 'image' : AUDIO_FORMATS.has(fmt) ? 'audio' : 'video';
        addMediaItem({ type, url: info.secure_url, caption: '' });
      }
    });
  }
  _uploadWidget.open();
}

function addMediaItem({ type, url, caption }) {
  const list = document.getElementById('media-list');
  const div = document.createElement('div');
  div.className = 'media-item';
  div.draggable = true;
  div.dataset.type = type;
  div.dataset.url = url;
  const shortUrl = url.replace(/^https?:\/\/[^/]+\//, '').slice(-50);
  const preview = type === 'image'
    ? `<img class="media-thumb" src="${escapeHtml(url)}" alt="">`
    : type === 'video' ? `<div class="media-icon">🎬</div>` : `<div class="media-icon">🎵</div>`;
  div.innerHTML = `
    <div class="media-item-header">
      <span class="drag-handle">⠿</span>
      ${preview}
      <div class="media-item-info">
        <div class="media-item-url">${escapeHtml(shortUrl)}</div>
        <div class="media-item-type">${escapeHtml(type)}</div>
      </div>
      <button type="button" class="media-del" onclick="this.closest('.media-item').remove()">✕</button>
    </div>
    <textarea class="media-caption" placeholder="Описание (caption)" rows="2">${escapeHtml(caption || '')}</textarea>`;
  bindDragEvents(div);
  list.appendChild(div);
}

function bindDragEvents(div) {
  const list = document.getElementById('media-list');

  // ── Desktop drag & drop ──
  div.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    div.classList.add('dragging');
    list._dragging = div;
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    list.querySelectorAll('.media-item').forEach(el => el.classList.remove('drag-over'));
    list._dragging = null;
  });
  div.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (list._dragging && list._dragging !== div) div.classList.add('drag-over');
  });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    const dragging = list._dragging;
    if (!dragging || dragging === div) return;
    const items = [...list.querySelectorAll('.media-item')];
    const fromIdx = items.indexOf(dragging);
    const toIdx = items.indexOf(div);
    if (fromIdx < toIdx) list.insertBefore(dragging, div.nextSibling);
    else list.insertBefore(dragging, div);
  });

  // ── Mobile touch drag (только по handle) ──
  const handle = div.querySelector('.drag-handle');
  if (!handle) return;

  let startY = 0, startX = 0, clone = null, origRect = null;

  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    startY = touch.clientY;
    startX = touch.clientX;
    origRect = div.getBoundingClientRect();

    // Создаём визуальный клон
    clone = div.cloneNode(true);
    clone.style.cssText = `
      position: fixed;
      left: ${origRect.left}px;
      top: ${origRect.top}px;
      width: ${origRect.width}px;
      opacity: 0.85;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      background: #fff;
      border-radius: 8px;
      transition: none;
    `;
    document.body.appendChild(clone);
    div.style.opacity = '0.3';
    list._dragging = div;
  }, { passive: false });

  handle.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!clone) return;
    const touch = e.touches[0];
    const dy = touch.clientY - startY;
    const dx = touch.clientX - startX;
    clone.style.transform = `translate(${dx}px, ${dy}px)`;

    // Определяем над каким элементом висим
    clone.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    clone.style.display = '';
    const target = el?.closest('.media-item');

    list.querySelectorAll('.media-item').forEach(el => el.classList.remove('drag-over'));
    if (target && target !== div) target.classList.add('drag-over');
  }, { passive: false });

  handle.addEventListener('touchend', e => {
    e.preventDefault();
    if (!clone) return;
    clone.remove();
    clone = null;
    div.style.opacity = '';

    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el?.closest('.media-item');
    list.querySelectorAll('.media-item').forEach(el => el.classList.remove('drag-over'));

    if (target && target !== div) {
      const items = [...list.querySelectorAll('.media-item')];
      const fromIdx = items.indexOf(div);
      const toIdx = items.indexOf(target);
      if (fromIdx < toIdx) list.insertBefore(div, target.nextSibling);
      else list.insertBefore(div, target);
    }
    list._dragging = null;
  }, { passive: false });
}

function previewCover(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    coverBase64 = e.target.result.split(',')[1];
    const ext = file.name.split('.').pop();
    coverPath = `uploads/${Date.now()}.${ext}`;
    document.getElementById('cover-preview-wrap').innerHTML = `<img class="img-preview" src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

async function saveProject() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Введите название'); return; }
  showStatus('Сохраняем...');

  let cover = existingCover;
  if (coverBase64) {
    showStatus('Загружаем фото...');
    await apiPutBinary(coverPath, coverBase64);
    cover = `/uploads/${coverPath.split('/').pop()}`;
  }

  const tags = [...document.querySelectorAll('.tag-cb input:checked')].map(cb => cb.value);
  const services = document.getElementById('f-services').value.split(',').map(s => s.trim()).filter(Boolean);
  const credits = [...document.getElementById('credits-list').querySelectorAll('.credit-row')].map(div => {
    const inputs = div.querySelectorAll('input');
    return { role: inputs[0].value.trim(), name: inputs[1].value.trim() };
  }).filter(c => c.role);

  const project = {
    title,
    subtitle: document.getElementById('f-subtitle').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    details: document.getElementById('f-details').value.trim(),
    services, tags, credits, cover,
    images: [...document.getElementById('media-list').querySelectorAll('.media-item')].map(div => ({
      type: div.dataset.type,
      url: div.dataset.url,
      caption: div.querySelector('.media-caption').value.trim()
    }))
  };

  if (editIdx === -1) projects.push(project);
  else projects[editIdx] = project;

  const json = JSON.stringify({ projects }, null, 2);
  const result = await apiPut('data/projects.json', json, projectsSha);
  projectsSha = result.content?.sha || projectsSha;

  closeForm();
  renderList();
  showStatus('✓ Сохранено! Сайт обновится через ~30 сек.');
  setTimeout(hideStatus, 4000);
}

async function deleteProject(i) {
  if (!confirm(`Удалить "${projects[i].title}"?`)) return;
  projects.splice(i, 1);
  showStatus('Удаляем...');
  const json = JSON.stringify({ projects }, null, 2);
  const result = await apiPut('data/projects.json', json, projectsSha);
  projectsSha = result.content?.sha || projectsSha;
  renderList();
  showStatus('✓ Удалено!');
  setTimeout(hideStatus, 2000);
}

function showStatus(msg) { const el = document.getElementById('status'); el.textContent = msg; el.style.display = 'block'; }
function hideStatus() { document.getElementById('status').style.display = 'none'; }
</script>
