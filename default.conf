server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Явно отдаём index.html для /en
    location = /en {
        try_files /index.html =404;
    }

    location = /en/ {
        try_files /index.html =404;
    }

    # Все остальные роуты SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
